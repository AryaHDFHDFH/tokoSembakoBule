<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Toko Sembako Bule</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* Sembunyikan alert di awal */
        .alert-error, .alert-success {
            display: none;
            margin-bottom: 15px;
        }
        .alert-error.show, .alert-success.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 class="auth-title">Toko Sembako <span>Bule</span></h2>
            
            <div class="alert alert-error" id="alert-error">
                Password dan konfirmasi password tidak pas!
            </div>

            <div class="alert alert-success" id="alert-success">
                Pendaftaran berhasil! Mengalihkan ke halaman login...
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <input type="hidden" name="action" value="register">

                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" name="full_name" class="form-control" required placeholder="Masukkan nama lengkap">
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" name="username" class="form-control" required placeholder="Buat username untuk login">
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" required placeholder="">
                </div>

                <div class="form-group">
                    <label>No. WhatsApp</label>
                    <input type="text" name="phone" class="form-control" required placeholder="">
                </div>

                <div class="form-group">
                    <label>Alamat Lengkap (Untuk Pengiriman)</label>
                    <textarea name="address" class="form-control" rows="3" required placeholder=""></textarea>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" name="password" class="form-control" required placeholder="Minimal 6 karakter">
                </div>

                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <input type="password" id="reg-confirm" name="confirm_password" class="form-control" required placeholder="Ulangi password">
                </div>

                <button type="submit" class="btn-primary" id="btn-register">Daftar Sekarang</button>
            </form>

            <div class="auth-link">
                Sudah punya akun? <a href="login.html">Login di sini</a>
            </div>
        </div>
    </div>
    <script src="assets/js/auth.js"></script>
    </body>
</html>
